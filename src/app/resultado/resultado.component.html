<!-- Histórico -->
<section *ngIf="historial.length > 0" class="bg-white rounded-3xl border border-gray-100 shadow-lg p-8">
  <div class="flex items-baseline justify-between mb-4">
    <h2 class="text-lg font-bold tracking-tight">Histórico</h2>
    <span class="text-xs font-semibold text-gray-400">{{ historialLabel }}</span>
  </div>
  <div class="flex flex-col">
    <div *ngFor="let item of historial" class="flex items-center justify-between gap-4 py-3.5 border-t border-gray-100">
      <span
        class="text-sm font-semibold leading-snug"
        [class.text-amber-600]="item.categoria === 'bajo'"
        [class.text-green-600]="item.categoria === 'ideal'"
        [class.text-red-600]="item.categoria === 'alto'">
        {{ item.mensaje }}
      </span>
      <span class="flex-none text-xs font-bold text-gray-500 bg-gray-50 px-3 py-1 rounded-full">IMC: {{ item.imc }}</span>
    </div>
  </div>
</section>
