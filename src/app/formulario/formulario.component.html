<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
  <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Calculadora IMC</h2>

  <!-- Nombre -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-600 mb-1">Nombre</label>
    <input
      type="text"
      [(ngModel)]="nombre"
      placeholder="Tu nombre"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
  </div>

  <!-- Sexo -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-600 mb-2">Sexo</label>
    <div class="flex gap-4">
      <label
        class="flex-1 text-center py-2 rounded-lg cursor-pointer border-2 transition-all"
        [class.border-blue-500]="sexo === 'hombre'"
        [class.bg-blue-50]="sexo === 'hombre'"
        [class.border-gray-300]="sexo !== 'hombre'">
        <input type="radio" [(ngModel)]="sexo" value="hombre" class="hidden">
        ♂ Hombre
      </label>
      <label
        class="flex-1 text-center py-2 rounded-lg cursor-pointer border-2 transition-all"
        [class.border-pink-500]="sexo === 'mujer'"
        [class.bg-pink-50]="sexo === 'mujer'"
        [class.border-gray-300]="sexo !== 'mujer'">
        <input type="radio" [(ngModel)]="sexo" value="mujer" class="hidden">
        ♀ Mujer
      </label>
    </div>
  </div>

  <!-- Altura -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-600 mb-1">Altura</label>
    <div class="flex items-center gap-4">
      <button
        (click)="restarAltura()"
        class="w-10 h-10 rounded-full bg-gray-200 hover:bg-gray-300 text-xl font-bold transition-colors">
        −
      </button>
      <span class="flex-1 text-center text-lg font-semibold">{{ altura }} cm</span>
      <button
        (click)="sumarAltura()"
        class="w-10 h-10 rounded-full bg-gray-200 hover:bg-gray-300 text-xl font-bold transition-colors">
        +
      </button>
    </div>
  </div>

  <!-- Peso -->
  <div class="mb-6">
    <label class="block text-sm font-medium text-gray-600 mb-1">Peso</label>
    <div class="flex items-center gap-4">
      <button
        (click)="restarPeso()"
        class="w-10 h-10 rounded-full bg-gray-200 hover:bg-gray-300 text-xl font-bold transition-colors">
        −
      </button>
      <span class="flex-1 text-center text-lg font-semibold">{{ peso }} kg</span>
      <button
        (click)="sumarPeso()"
        class="w-10 h-10 rounded-full bg-gray-200 hover:bg-gray-300 text-xl font-bold transition-colors">
        +
      </button>
    </div>
  </div>

  <!-- Botones -->
  <div class="flex gap-4">
    <button
      (click)="borrar()"
      class="flex-1 py-2 rounded-lg bg-red-100 text-red-600 font-semibold hover:bg-red-200 transition-colors">
      ✕ Borrar
    </button>
    <button
      (click)="calcular()"
      class="flex-1 py-2 rounded-lg bg-green-500 text-white font-semibold hover:bg-green-600 transition-colors">
      ✓ Calcular
    </button>
  </div>
</div>
