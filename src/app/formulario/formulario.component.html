<section class="flex-1 min-w-[400px] bg-white rounded-3xl border border-gray-100 shadow-lg p-8">
  <h2 class="text-lg font-bold tracking-tight mb-6">Datos</h2>

  <!-- Nombre -->
  <div class="mb-5">
    <label class="block text-xs font-semibold text-gray-500 mb-2">Nombre <span class="text-red-500">*</span></label>
    <input
      type="text"
      required
      [(ngModel)]="nombre"
      (ngModelChange)="nombreInvalido = false"
      placeholder="Tu nombre"
      class="w-full px-4 py-3 text-sm text-gray-800 placeholder-gray-400 border rounded-xl outline-none transition-colors focus:bg-white"
      [ngClass]="nombreInvalido
        ? ['border-red-400', 'focus:border-red-500']
        : ['border-gray-200', 'focus:border-indigo-500']">
    <p *ngIf="nombreInvalido" class="mt-1.5 text-xs font-semibold text-red-600">El nombre es obligatorio</p>
  </div>

  <!-- Sexo -->
  <label class="block text-xs font-semibold text-gray-500 mb-2">Sexo</label>
  <div class="grid grid-cols-2 gap-3 mb-5">
    <button
      type="button"
      (click)="sexo = 'hombre'"
      class="p-3 text-sm font-bold rounded-xl cursor-pointer transition-all border"
      [ngClass]="sexo === 'hombre'
        ? ['text-white', 'bg-blue-500', 'border-blue-500', 'shadow-lg', 'shadow-blue-500/50', 'hover:bg-blue-600', 'hover:border-blue-600']
        : ['text-gray-500', 'bg-gray-50', 'border-gray-200', 'hover:border-gray-300', 'hover:text-gray-700']">
      Hombre
    </button>
    <button
      type="button"
      (click)="sexo = 'mujer'"
      class="p-3 text-sm font-bold rounded-xl cursor-pointer transition-all border"
      [ngClass]="sexo === 'mujer'
        ? ['text-white', 'bg-pink-500', 'border-pink-500', 'shadow-lg', 'shadow-pink-500/50', 'hover:bg-pink-600', 'hover:border-pink-600']
        : ['text-gray-500', 'bg-gray-50', 'border-gray-200', 'hover:border-gray-300', 'hover:text-gray-700']">
      Mujer
    </button>
  </div>

  <!-- Altura -->
  <label class="block text-xs font-semibold text-gray-500 mb-2">Altura</label>
  <div class="flex items-center justify-between border border-gray-200 rounded-2xl px-3.5 py-2.5 mb-4">
    <button
      type="button"
      (click)="restarAltura()"
      aria-label="Restar altura"
      class="w-12 h-12 flex-none rounded-full border border-gray-200 bg-white text-gray-700 text-2xl font-semibold leading-none cursor-pointer flex items-center justify-center transition hover:border-gray-300 hover:shadow-md active:scale-90">
      −
    </button>
    <div class="text-center">
      <span class="text-3xl font-extrabold tracking-tight leading-none">{{ altura }}</span>
      <span class="text-sm font-semibold text-gray-400 ml-1">cm</span>
    </div>
    <button
      type="button"
      (click)="sumarAltura()"
      aria-label="Sumar altura"
      class="w-12 h-12 flex-none rounded-full border border-gray-200 bg-white text-gray-700 text-2xl font-semibold leading-none cursor-pointer flex items-center justify-center transition hover:border-gray-300 hover:shadow-md active:scale-90">
      +
    </button>
  </div>

  <!-- Peso -->
  <label class="block text-xs font-semibold text-gray-500 mb-2">Peso</label>
  <div class="flex items-center justify-between border border-gray-200 rounded-2xl px-3.5 py-2.5 mb-7">
    <button
      type="button"
      (click)="restarPeso()"
      aria-label="Restar peso"
      class="w-12 h-12 flex-none rounded-full border border-gray-200 bg-white text-gray-700 text-2xl font-semibold leading-none cursor-pointer flex items-center justify-center transition hover:border-gray-300 hover:shadow-md active:scale-90">
      −
    </button>
    <div class="text-center">
      <span class="text-3xl font-extrabold tracking-tight leading-none">{{ peso }}</span>
      <span class="text-sm font-semibold text-gray-400 ml-1">kg</span>
    </div>
    <button
      type="button"
      (click)="sumarPeso()"
      aria-label="Sumar peso"
      class="w-12 h-12 flex-none rounded-full border border-gray-200 bg-white text-gray-700 text-2xl font-semibold leading-none cursor-pointer flex items-center justify-center transition hover:border-gray-300 hover:shadow-md active:scale-90">
      +
    </button>
  </div>

  <!-- Actions -->
  <div class="grid grid-cols-2 gap-3">
    <button
      type="button"
      (click)="borrar()"
      class="p-3.5 text-sm font-bold text-red-600 bg-red-50 border border-red-100 rounded-xl cursor-pointer transition-colors hover:bg-red-100 active:scale-95">
      Borrar
    </button>
    <button
      type="button"
      (click)="calcular()"
      class="p-3.5 text-sm font-bold text-white bg-green-600 border border-green-600 rounded-xl cursor-pointer shadow-lg shadow-green-600/50 transition-all hover:bg-green-700 active:scale-95">
      Calcular
    </button>
  </div>
</section>
