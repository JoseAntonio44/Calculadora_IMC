<div class="min-h-screen bg-gray-100 font-sans text-gray-800 flex flex-col items-center px-5 pt-10 pb-14">
  <div class="w-full max-w-[1060px]">
    <header class="mb-7">
      <h1 class="text-3xl font-extrabold tracking-tight m-0">Calculadora IMC</h1>
      <p class="mt-1.5 mb-0 text-gray-500 text-sm font-medium">Índice de Masa Corporal · calcula y registra tus mediciones</p>
    </header>

    <div class="flex flex-wrap gap-6 items-start">
      <!-- Formulario -->
      <app-formulario (calcularIMC)="onCalcular($event)"></app-formulario>

      <!-- Resultados -->
      <div class="flex-1 min-w-[400px]">
        <app-resultado [historial]="historial"></app-resultado>
      </div>
    </div>
  </div>
</div>

<!-- Modal de resultado -->
<div
  *ngIf="mostrarModal && ultimoResultado"
  (click)="cerrarModal()"
  class="fixed inset-0 bg-black/40 flex items-center justify-center p-5 z-50">
  <div
    (click)="$event.stopPropagation()"
    class="bg-white rounded-3xl shadow-lg p-8 w-full max-w-sm relative">
    <button
      type="button"
      (click)="cerrarModal()"
      aria-label="Cerrar"
      class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors">
      ✕
    </button>

    <h2 class="text-lg font-bold tracking-tight mb-4">Resultado</h2>

    <div
      class="text-2xl font-extrabold leading-snug tracking-tight"
      [class.text-amber-600]="ultimoResultado.categoria === 'bajo'"
      [class.text-green-600]="ultimoResultado.categoria === 'ideal'"
      [class.text-red-600]="ultimoResultado.categoria === 'alto'">
      {{ ultimoResultado.mensaje }}
    </div>
    <div class="mt-3 inline-flex items-baseline gap-1.5">
      <span class="text-xs font-semibold text-gray-400">IMC:</span>
      <span class="text-xs font-bold text-gray-500">{{ ultimoResultado.imc }}</span>
    </div>

    <button
      type="button"
      (click)="cerrarModal()"
      class="mt-6 w-full p-3.5 text-sm font-bold text-white bg-green-600 border border-green-600 rounded-xl cursor-pointer shadow-lg shadow-green-600/50 transition-all hover:bg-green-700 active:scale-95">
      Aceptar
    </button>
  </div>
</div>

<!-- Toasts -->
<app-toast></app-toast>
